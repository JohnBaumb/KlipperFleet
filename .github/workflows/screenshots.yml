name: Generate Screenshots

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'ui/index.html'
      - 'screenshots/**'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r screenshots/requirements.txt httpx
          playwright install chromium --with-deps

      - name: Generate screenshots
        run: python screenshots/take_screenshots.py

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: images/*.png
